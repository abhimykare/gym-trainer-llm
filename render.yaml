services:
  - type: web
    name: whatsapp-gym-trainer
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: WHATSAPP_SESSION_PATH
        value: /app/whatsapp-session
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
