services:
  - type: web
    name: whatsapp-gym-trainer
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: WHATSAPP_SESSION_PATH
        value: /app/whatsapp-session
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BOT_PHONE_NUMBER
        sync: false
