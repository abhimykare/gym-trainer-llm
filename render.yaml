services:
  - type: web
    name: whatsapp-gym-trainer
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_SESSION_PATH
        value: /opt/render/project/src/whatsapp-session
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/whatsapp-session
      sizeGB: 1
